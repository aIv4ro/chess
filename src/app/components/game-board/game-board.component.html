<div class="board-container">
  <div *ngFor="let piece of board.squares; let pieceIndex = index"
    class="board-celd"
    [ngClass]="{
      'white-celd': (piece.row + piece.col) % 2 === 0,
      'green-celd': (piece.row + piece.col) % 2 !== 0 
    }"
    [style.backgroundImage]="piece.type === undefined ? '' : 'url(/assets/' + piece.color + '-' + piece.type + '.png)'"
    [style.cursor]="piece.type === undefined ? '' : 'pointer'"
  >
  </div>
</div>
